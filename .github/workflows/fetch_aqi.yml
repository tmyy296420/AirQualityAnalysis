name: Hourly AQI Collection

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Initialize database
        run: python src/etl/db_schema.py

      - name: Run data fetch script
        env:
          CNEMC_ACCESS_KEY: ${{ secrets.CNEMC_ACCESS_KEY }}
        run: python src/etl/fetch_api.py

      - name: Commit and push new data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main
          git add data/
          git commit -m "Auto-collect $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push origin main
