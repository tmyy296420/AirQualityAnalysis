name: Hourly Air Quality Collection

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas sqlalchemy

      - name: Run data collection
        env:
          CNEMC_ACCESS_KEY: ${{ secrets.CNEMC_ACCESS_KEY }}
        run: python -m src.etl.fetch_api

      - name: Auto commit database
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 auto: hourly collection $(date -u '+%Y-%m-%d %H:%M UTC')"
          file_pattern: 'data/air_quality.db'
